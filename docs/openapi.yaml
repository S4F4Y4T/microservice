openapi: 3.0.3
info:
  title: Microservice API
  version: "1.0.0"
  description: REST API for the microservice.
servers:
  - url: http://localhost:6969
    description: Local dev

tags:
  - name: users

paths:
  /users/:
    get:
      tags: [users]
      summary: List users
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based).
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserList"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [users]
      summary: Get user by ID
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [users]
      summary: Update user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [users]
      summary: Delete user
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    ErrorBody:
      type: object
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - INVALID_INPUT
            - CONFLICT
            - UNAUTHORIZED
            - FORBIDDEN
            - INTERNAL
        message:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
          example: 42
        total_pages:
          type: integer
          example: 5

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
        meta:
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"

    ApiResponseUser:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    ApiResponseUserList:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/User"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                $ref: "#/components/schemas/ErrorBody"
